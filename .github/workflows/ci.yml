name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Start PostgreSQL + Spring Boot backend via Docker Compose
      - name: Start backend services
        run: docker compose up --build -d

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api-docs > /dev/null 2>&1; then
              echo "Backend is up"
              break
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done

      # 3. Install frontend dependencies and start dev server in background
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Start frontend dev server
        run: npm run dev &
        working-directory: frontend

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is up"
              break
            fi
            echo "Attempt $i/15 - waiting 3s..."
            sleep 3
          done

      # 4. Install Playwright and run the test suite
      - name: Install test dependencies
        run: npm install
        working-directory: tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Run Playwright E2E tests
        run: npm test
        working-directory: tests

      # 5. Upload test report as artifact (visible in GitHub Actions UI)
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7