spring:
  application:
    name: budgetboard

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:budgetboard}
    username: ${DB_USER:budgetboard}
    password: ${DB_PASSWORD:budgetboard}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always


jwt:
  secret: ${JWT_SECRET:ThisIsASecretKeyForDevelopmentOnlyPleaseChangeInProduction!}
  expiration-ms: 86400000      # 24 hours


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method

logging:
  level:
    com.budgetboard: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO